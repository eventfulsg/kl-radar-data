<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Eventful · Radar Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23F26F21%22/><text x=%2250%22 y=%2266%22 font-size=%2250%22 text-anchor=%22middle%22>📱</text></svg>">
<style>
  :root{
    --orange:#F26F21; --red:#C41230; --ink:#2B2521; --cream:#F3EADB;
    --rail:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Jost',sans-serif;background:#141110;color:#fff;overflow:hidden}

  /* Phone-frame layout: full-bleed on mobile, centered device on desktop */
  .stage{height:100dvh;display:flex;align-items:center;justify-content:center}
  .phone{position:relative;width:100%;height:100dvh;background:#000;overflow:hidden}
  @media (min-width:560px){
    body{background:radial-gradient(1200px 700px at 50% -10%, #3a2317 0%, #141110 55%)}
    .phone{width:min(430px,100vw);height:min(890px,96dvh);border-radius:36px;
      box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 10px #1d1917,0 0 0 12px rgba(255,255,255,.07)}
  }

  /* ---- Feed ---- */
  .feed{height:100%;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none}
  .feed::-webkit-scrollbar{display:none}
  .card{position:relative;height:100%;scroll-snap-align:start;scroll-snap-stop:always;overflow:hidden;background:#000}
  .card .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:none}
  .card .bg.blur{filter:blur(40px) brightness(.5);transform:scale(1.2)}
  .card .bg.main{object-fit:contain}
  .card .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:110px;
    background:linear-gradient(160deg,#5a2c12 0%,#2b1508 60%,#170b04 100%)}
  .shade{position:absolute;inset:0;background:
    linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 18%),
    linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.35) 30%, transparent 55%)}

  /* ---- Top chrome ---- */
  .top{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(10px + env(safe-area-inset-top)) 12px 8px;
    display:flex;flex-direction:column;gap:8px}
  .toprow{display:flex;align-items:center;gap:8px}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-.01em;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .brand .dot{width:26px;height:26px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
  .spacer{flex:1}
  .pill{font-family:inherit;font-size:12.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 12px;cursor:pointer;backdrop-filter:blur(8px)}
  .pill.on{background:var(--orange);border-color:var(--orange)}
  .chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
  .chips::-webkit-scrollbar{display:none}
  .chips .pill{flex:none}

  /* ---- Card content ---- */
  .content{position:absolute;left:0;right:var(--rail);bottom:0;z-index:4;
    padding:0 14px calc(18px + env(safe-area-inset-bottom))}
  .handle-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .handle{font-weight:800;font-size:16px;color:#fff;text-decoration:none;text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .badge{font-size:11px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:99px;background:var(--red);color:#fff}
  .mult{font-size:12px;font-weight:800;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px)}
  .mult.hot{background:rgba(242,111,33,.55)}
  .mult.fire{background:var(--orange)}
  .cap{font-size:14.5px;line-height:1.45;max-height:3em;overflow:hidden;cursor:pointer;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-shadow:0 1px 5px rgba(0,0,0,.7)}
  .cap.open{max-height:40vh;-webkit-line-clamp:unset;overflow-y:auto}
  .meta{font-size:12px;color:rgba(255,255,255,.75);margin-top:8px;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .collabs{font-size:11.5px;color:rgba(255,255,255,.65);margin-top:3px}

  /* ---- Action rail ---- */
  .rail{position:absolute;right:6px;bottom:calc(24px + env(safe-area-inset-bottom));z-index:4;
    display:flex;flex-direction:column;gap:16px;align-items:center;width:var(--rail)}
  .act{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:0;background:none;color:#fff;font-family:inherit}
  .act .ico{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);
    display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .12s}
  .act:active .ico{transform:scale(.86)}
  .act .lbl{font-size:10.5px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.7)}
  .act.saved .ico{background:var(--orange)}

  /* ---- Heart burst (double-tap) ---- */
  .burst{position:absolute;z-index:6;font-size:84px;pointer-events:none;transform:translate(-50%,-50%) scale(.4);opacity:0;
    animation:burst .7s ease forwards;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
  @keyframes burst{15%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}60%{opacity:1;transform:translate(-50%,-58%) scale(1)}100%{opacity:0;transform:translate(-50%,-90%) scale(.9)}}

  /* ---- Counter / status / toast ---- */
  .counter{position:absolute;right:12px;top:calc(96px + env(safe-area-inset-top));z-index:5;font-size:11.5px;font-weight:700;
    background:rgba(0,0,0,.4);border-radius:99px;padding:4px 10px;backdrop-filter:blur(6px)}
  .gticker{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  .gticker::-webkit-scrollbar{display:none}
  .gticker a{flex:none;font-size:11.5px;font-weight:700;color:#fff;text-decoration:none;background:rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 11px;backdrop-filter:blur(6px)}
  .gticker a span{color:rgba(255,255,255,.6);font-weight:500}
  .state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:0 32px}
  .state .big{font-size:56px}
  .state p{font-size:14.5px;color:rgba(255,255,255,.75);line-height:1.5}
  .toast{position:absolute;bottom:45%;left:50%;transform:translateX(-50%);z-index:9;
    background:#fff;color:var(--ink);font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .swipehint{position:absolute;bottom:38%;left:50%;transform:translateX(-50%);z-index:5;
    font-size:12px;font-weight:700;color:rgba(255,255,255,.85);background:rgba(0,0,0,.4);border-radius:99px;padding:6px 14px;
    backdrop-filter:blur(6px);animation:bob 1.6s ease-in-out infinite;pointer-events:none}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-7px)}}
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="top">
      <div class="toprow">
        <div class="brand"><div class="dot">📡</div>Radar Feed</div>
        <div class="spacer"></div>
        <button class="pill" id="regMy" onclick="setRegion('my')">🇲🇾 KL</button>
        <button class="pill" id="regSg" onclick="setRegion('sg')">🇸🇬 SG</button>
        <a class="pill" href="/" style="text-decoration:none">☰</a>
      </div>
      <div class="chips" id="chips">
        <button class="pill on" data-tab="all" onclick="setTab('all')">🔥 For You</button>
        <button class="pill" data-tab="event" onclick="setTab('event')">🎪 Events</button>
        <button class="pill" data-tab="deal" onclick="setTab('deal')">🍔 Deals</button>
        <button class="pill" data-tab="launch" onclick="setTab('launch')">🆕 Launches</button>
        <button class="pill" data-tab="trend" onclick="setTab('trend')">📰 News</button>
        <button class="pill" data-tab="saved" onclick="setTab('saved')">🔖 Saved</button>
      </div>
      <div class="gticker" id="gticker" style="display:none"></div>
    </div>
    <div class="counter" id="counter" style="display:none"></div>
    <div class="feed" id="feed">
      <div class="state"><div class="big">📡</div><p>Loading the latest scan…</p></div>
    </div>
    <div class="swipehint" id="swipehint" style="display:none">Swipe up ↑</div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
const FEEDS = {
  my: 'https://raw.githubusercontent.com/eventfulsg/kl-radar-data/main/results.json',
  sg: 'https://raw.githubusercontent.com/eventfulsg/kl-radar-data/main/results-sg.json',
};
const CAT_BADGE = {deal:'🍔 DEAL', event:'🎪 EVENT', launch:'🆕 LAUNCH', trend:'📰 NEWS', other:''};
const CAT_EMOJI = {deal:'🍔', event:'🎪', launch:'🆕', trend:'📰', other:'✨'};

let region = localStorage.getItem('klr_region') || 'my';
let tab = 'all';
let feed = null;
let saved = loadSaved();
let hintShown = false;

function loadSaved(){
  try{ return JSON.parse(localStorage.getItem('klr_saved') || '{}'); }catch(e){ return {}; }
}
function persistSaved(){ localStorage.setItem('klr_saved', JSON.stringify(saved)); }

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fmt(n){ return (n||0).toLocaleString('en-US'); }
function ago(sec){ const m=Math.round((Date.now()/1000-sec)/60); if(m<1) return 'just now'; if(m<60) return m+' min ago'; const h=m/60; if(h<24) return h.toFixed(1)+'h ago'; return Math.round(h/24)+'d ago'; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._x); toast._x=setTimeout(()=>t.classList.remove('show'),1700); }

function setRegion(r){
  region = r; localStorage.setItem('klr_region', r);
  document.getElementById('regMy').classList.toggle('on', r==='my');
  document.getElementById('regSg').classList.toggle('on', r==='sg');
  feed = null;
  loadFeed();
}

function setTab(t){
  tab = t;
  document.querySelectorAll('#chips .pill').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  render();
}

async function loadFeed(){
  const el = document.getElementById('feed');
  el.innerHTML = '<div class="state"><div class="big">📡</div><p>Loading the latest scan…</p></div>';
  const forRegion = region;
  try{
    const r = await fetch(FEEDS[forRegion]+'?t='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('feed '+r.status);
    const f = await r.json();
    if(forRegion !== region) return;
    feed = f;
    render();
  }catch(e){
    if(forRegion !== region) return;
    el.innerHTML = '<div class="state"><div class="big">📭</div><p>No data for this region yet.<br>Open the <a href="/" style="color:var(--orange)">dashboard</a> and hit 📡 Rescan now.</p></div>';
  }
}

function bySurprise(a,b){
  return ((b.mult??1)-(a.mult??1)) || ((b.score||0)-(a.score||0));
}
function postKey(p){ return p.url; }

function currentList(){
  if(!feed) return [];
  if(tab==='saved'){
    return Object.values(saved).sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
  }
  if(tab==='trend') return (feed.trending||[]).slice().sort(bySurprise);
  const posts = (feed.posts||[]).slice().sort(bySurprise);
  return tab==='all' ? posts : posts.filter(p=>p.cat===tab);
}

function multChip(p){
  if(p.mult==null) return '';
  const cls = p.mult>=4?'fire':p.mult>=2?'hot':'';
  return `<span class="mult ${cls}">⚡ ${p.mult}× their usual</span>`;
}

function render(){
  const el = document.getElementById('feed');
  const gt = document.getElementById('gticker');

  // Google Trends ticker only on the News tab
  if(tab==='trend' && feed && (feed.gtrends||[]).length){
    gt.style.display = 'flex';
    gt.innerHTML = feed.gtrends.slice(0,10).map(t=>
      `<a href="https://www.google.com/search?q=${encodeURIComponent(t.q)}" target="_blank" rel="noopener">🔎 ${esc(t.q)} <span>${esc(t.traffic)}</span></a>`).join('');
  } else {
    gt.style.display = 'none';
  }

  if(!feed){ return; }
  const list = currentList().slice(0,25);
  if(!list.length){
    el.innerHTML = tab==='saved'
      ? '<div class="state"><div class="big">🔖</div><p>Nothing saved yet.<br>Double-tap a post, or hit the bookmark on the right.</p></div>'
      : '<div class="state"><div class="big">🌵</div><p>Nothing in this category in the last scan.</p></div>';
    document.getElementById('counter').style.display = 'none';
    document.getElementById('swipehint').style.display = 'none';
    return;
  }

  el.innerHTML = list.map((p,i)=>{
    const k = esc(postKey(p));
    const isSaved = !!saved[postKey(p)];
    const img = p.img
      ? `<img class="bg blur" src="/api/img?u=${encodeURIComponent(p.img)}" loading="lazy" alt="" aria-hidden="true" onerror="imgFail(this)">
         <img class="bg main" src="/api/img?u=${encodeURIComponent(p.img)}" loading="lazy" alt="" onerror="imgFail(this)">`
      : '';
    return `
    <section class="card" data-i="${i}" data-key="${k}">
      <div class="fallback">${CAT_EMOJI[p.cat]||'✨'}</div>
      ${img}
      <div class="shade"></div>
      <div class="content">
        <div class="handle-row">
          <a class="handle" href="https://www.instagram.com/${esc(p.u)}/" target="_blank" rel="noopener">@${esc(p.u)}</a>
          ${CAT_BADGE[p.cat]?`<span class="badge">${CAT_BADGE[p.cat]}</span>`:''}
          ${multChip(p)}
        </div>
        <div class="cap" onclick="this.classList.toggle('open')">${esc(p.cap)||'<i>(no caption)</i>'}</div>
        <div class="meta">${p.measured?'📈':'⏱'} ${esc(p.velStr)} · ❤️ ${fmt(p.likes)} · 💬 ${fmt(p.comments)}${p.views?' · ▶️ '+fmt(p.views):''} · ${p.ageH}h old</div>
        ${p.co&&p.co.length?`<div class="collabs">🤝 with ${p.co.map(c=>'@'+esc(c)).join(', ')}</div>`:''}
      </div>
      <div class="rail">
        <button class="act ${isSaved?'saved':''}" data-save onclick="toggleSave(this)">
          <span class="ico">${isSaved?'🔖':'📑'}</span><span class="lbl">${isSaved?'Saved':'Save'}</span>
        </button>
        <button class="act" onclick="sharePost(this)"><span class="ico">📤</span><span class="lbl">Share</span></button>
        <a class="act" href="${esc(p.url)}" target="_blank" rel="noopener"><span class="ico">📸</span><span class="lbl">IG</span></a>
      </div>
    </section>`;
  }).join('');

  el.scrollTop = 0;
  setupCounter(list.length);
  setupDoubleTap();
  if(!hintShown && list.length>1){
    hintShown = true;
    const h = document.getElementById('swipehint');
    h.style.display = 'block';
    setTimeout(()=>{ h.style.display='none'; }, 3500);
  }
}

function imgFail(img){ img.remove(); }

// keep a lookup of the currently rendered list so rail buttons can find data
function findPost(key){
  return currentList().slice(0,25).find(p=>postKey(p)===key) || saved[key];
}

function toggleSave(btn){
  const card = btn.closest('.card');
  const key = card.dataset.key;
  if(saved[key]){
    delete saved[key];
    btn.classList.remove('saved');
    btn.innerHTML = '<span class="ico">📑</span><span class="lbl">Save</span>';
    toast('Removed from saved');
    if(tab==='saved'){ persistSaved(); render(); return; }
  } else {
    const p = findPost(key);
    if(!p) return;
    saved[key] = Object.assign({}, p, {savedAt: Date.now(), region});
    btn.classList.add('saved');
    btn.innerHTML = '<span class="ico">🔖</span><span class="lbl">Saved</span>';
    toast('Saved 🔖');
  }
  persistSaved();
}

function sharePost(btn){
  const card = btn.closest('.card');
  const p = findPost(card.dataset.key);
  if(!p) return;
  const text = '@'+p.u+(p.mult!=null?' ⚡'+p.mult+'× their usual':'')+'\n'+(p.cap||'').slice(0,120)+'\n'+p.url;
  if(navigator.share){
    navigator.share({text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>toast('Copied — paste into team chat'));
  }
}

// ---- double-tap to save with heart burst ----
function setupDoubleTap(){
  document.querySelectorAll('.card').forEach(card=>{
    let last = 0;
    card.addEventListener('click', (e)=>{
      if(e.target.closest('.rail, .cap, .handle, a, button')) return;
      const now = Date.now();
      if(now - last < 320){
        const b = document.createElement('div');
        b.className = 'burst'; b.textContent = '🔖';
        b.style.left = e.offsetX!=null ? (e.clientX - card.getBoundingClientRect().left)+'px' : '50%';
        b.style.top  = (e.clientY - card.getBoundingClientRect().top)+'px';
        card.appendChild(b);
        setTimeout(()=>b.remove(), 750);
        const saveBtn = card.querySelector('[data-save]');
        if(saveBtn && !saveBtn.classList.contains('saved')) toggleSave(saveBtn);
        last = 0;
      } else { last = now; }
    });
  });
}

// ---- position counter ----
let observer = null;
function setupCounter(total){
  const counter = document.getElementById('counter');
  counter.style.display = 'block';
  counter.textContent = '1 / '+total;
  if(observer) observer.disconnect();
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        counter.textContent = (Number(en.target.dataset.i)+1)+' / '+total;
      }
    });
  }, {root: document.getElementById('feed'), threshold: 0.6});
  document.querySelectorAll('.card').forEach(c=>observer.observe(c));
}

// ---- keyboard nav (desktop) ----
document.addEventListener('keydown',(e)=>{
  const el = document.getElementById('feed');
  const h = el.clientHeight;
  if(e.key==='ArrowDown' || e.key===' '){ e.preventDefault(); el.scrollBy({top:h, behavior:'smooth'}); }
  if(e.key==='ArrowUp'){ e.preventDefault(); el.scrollBy({top:-h, behavior:'smooth'}); }
  if(e.key==='ArrowRight'){ cycleTab(1); }
  if(e.key==='ArrowLeft'){ cycleTab(-1); }
});
function cycleTab(d){
  const tabs = ['all','event','deal','launch','trend','saved'];
  setTab(tabs[(tabs.indexOf(tab)+d+tabs.length)%tabs.length]);
}

setRegion(region);
</script>
</body>
</html>
